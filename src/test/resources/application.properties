# Test profile — dummy secrets so the Spring context loads without the gitignored
# production application.properties. The real Telegram transport is replaced by
# TestTelegramClient (see harness/), so the token is never used to talk to Telegram.
bot.token=test-token
bot.username=@AmbotorixTestBot
bot.adminId=1
bot.admin.id=1

# Read the committed leader snapshot straight from the main resources (real data,
# real images) and never hit the network on startup.
data.dir=src/main/resources
data.update.on-startup=false

# Don't register/start the long-polling bot session in tests (it would call Telegram on
# startup). We drive Ambotorix.consume(...) directly via TestTelegramClient instead.
spring.autoconfigure.exclude=org.telegram.telegrambots.longpolling.starter.TelegramBotStarterConfiguration

logging.level.vitbuk.com.Ambotorix=WARN
