name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Create application.properties
        run: |
          cat > src/main/resources/application.properties << 'EOF'
          spring.application.name=Ambotorix
          bot.token=test_token
          bot.username=@TestBot
          bot.admin.id=123456789
          data.dir=src/main/resources
          lobby.auto-terminate.hours=4
          data.update.cron=0 0 3 * * *
          EOF

      - name: Build and test
        run: ./mvnw verify
